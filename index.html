<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1c2b1a">
<title>Vivai Cintoli — Fiera Zagabria 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --verde: #1c2b1a;
  --verde-m: #2e4a28;
  --oliva: #4a6741;
  --salvia: #7a9e6e;
  --menta: #b5ceaa;
  --oro: #c9a84c;
  --oro-l: #e2c97e;
  --crema: #f4ede0;
  --crema-d: #e5d9c6;
  --avorio: #faf6ee;
  --text: #1c2b1a;
  --text-s: #4a5e42;
  --text-m: #7a8e72;
  --wa: #25d366;
  --r: 6px;
  --shadow: 0 8px 32px rgba(14,26,14,.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Jost', sans-serif;
  background: var(--avorio);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--salvia); border-radius: 2px; }

/* ── PAGES ── */
.page { display: none; }
.page.active { display: block; }
.pt { padding-top: 90px; }
.ptb { padding-top: 90px; padding-bottom: 68px; }

/* ── LANG BAR ── */
.lang-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  height: 34px; background: var(--verde);
  display: flex; align-items: center; justify-content: flex-end;
  padding: 0 18px; gap: 3px;
}
.lb {
  background: transparent; border: none;
  color: rgba(244,237,224,.4);
  font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .08em; cursor: pointer; padding: 4px 8px;
  border-radius: 3px; transition: all .18s;
}
.lb:hover, .lb.on { background: rgba(244,237,224,.12); color: var(--oro); }

/* ── NAV ── */
nav {
  position: fixed; top: 34px; left: 0; right: 0; z-index: 400;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px;
  background: rgba(250,246,238,.97);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(28,43,26,.08);
}
.nav-brand {
  display: flex; align-items: center; gap: 9px;
  cursor: pointer; text-decoration: none;
}
.nav-logo {
  height: 28px; object-fit: contain;
}
.nav-name { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 600; color: var(--verde); }
.nav-sub { font-size: 9px; letter-spacing: .16em; text-transform: uppercase; color: var(--text-m); }
.nav-links { display: flex; align-items: center; gap: 2px; }
.nl {
  padding: 7px 10px; border: none; background: transparent; cursor: pointer;
  font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 600;
  letter-spacing: .09em; text-transform: uppercase;
  color: var(--text-s); border-radius: 3px; transition: all .2s;
  white-space: nowrap;
}
.nl:hover, .nl.on { background: var(--verde); color: var(--crema); }
.nl-cta { background: var(--oro) !important; color: var(--verde) !important; }
.nl-cta:hover { background: var(--oro-l) !important; }
.nav-nfc {
  background: transparent; border: 1.5px solid var(--oro); color: var(--oro);
  padding: 6px 11px; border-radius: 20px;
  font-family: 'Jost', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: .1em; cursor: pointer; transition: all .2s;
}
.nav-nfc:hover { background: var(--oro); color: var(--verde); }

/* ── BOTTOM BAR (mobile) ── */
.bbar {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 400;
  height: 58px; background: var(--avorio);
  border-top: 1px solid var(--crema-d);
  justify-content: space-around; align-items: center;
}
.bb {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  background: none; border: none; cursor: pointer;
  font-family: 'Jost', sans-serif; font-size: 9px; font-weight: 600;
  letter-spacing: .05em; text-transform: uppercase;
  color: var(--text-m); transition: color .2s; padding: 6px 0;
}
.bb-icon { font-size: 20px; line-height: 1; }
.bb.on { color: var(--verde); }
.bb-q { color: var(--oro) !important; }

/* ── NFC OVERLAY ── */
.nfc-overlay {
  display: none; position: fixed; inset: 0; z-index: 900;
  background: var(--verde);
  flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 36px 24px; overflow: hidden;
}
.nfc-overlay.open { display: flex; }
.nfc-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 25% 75%, rgba(74,103,65,.4) 0%, transparent 55%),
              radial-gradient(ellipse at 80% 15%, rgba(201,168,76,.1) 0%, transparent 50%);
}
.nfc-rings {
  position: relative;
  width: 110px; height: 110px;
  margin-bottom: 40px;
  flex-shrink: 0;
}
.nfc-ring {
  position: absolute; top: 50%; left: 50%; border-radius: 50%;
  border: 1.5px solid rgba(201,168,76,.35);
  transform: translate(-50%,-50%) scale(1);
  animation: nfcExpand 2.4s cubic-bezier(.2,.8,.4,1) infinite;
  pointer-events: none;
}
.nfc-ring:nth-child(1) { width: 110px; height: 110px; animation-delay: 0s; }
.nfc-ring:nth-child(2) { width: 110px; height: 110px; animation-delay: .8s; border-color: rgba(201,168,76,.22); }
.nfc-ring:nth-child(3) { width: 110px; height: 110px; animation-delay: 1.6s; border-color: rgba(201,168,76,.1); }
@keyframes nfcExpand {
  0%   { transform: translate(-50%,-50%) scale(1);   opacity: .85; }
  100% { transform: translate(-50%,-50%) scale(2.8); opacity: 0;   }
}
.nfc-center {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 110px; height: 110px; border-radius: 50%;
  background: rgba(201,168,76,.08);
  border: 1.5px solid rgba(201,168,76,.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
  box-shadow: 0 0 0 0 rgba(201,168,76,.15);
  animation: nfcGlow 2.4s ease-in-out infinite;
}
@keyframes nfcGlow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,.15); }
  50%       { box-shadow: 0 0 0 12px rgba(201,168,76,.0); }
}
.nfc-center img {
  height: 52px;
  opacity: .92;
  filter: drop-shadow(0 0 8px rgba(201,168,76,.4));
}
.nfc-eye { font-size: 10px; letter-spacing: .28em; text-transform: uppercase; color: var(--oro); margin-bottom: 11px; font-weight: 600; position: relative; }
.nfc-title { font-family: 'Playfair Display', serif; font-size: clamp(34px,9vw,60px); font-weight: 400; color: var(--crema); line-height: 1.08; margin-bottom: 8px; position: relative; }
.nfc-title em { font-style: italic; color: var(--menta); }
.nfc-sub { font-size: 13px; color: rgba(244,237,224,.42); font-weight: 300; margin-bottom: 40px; line-height: 1.7; max-width: 290px; position: relative; }
.nfc-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 296px; position: relative; }
.nfcb {
  width: 100%; padding: 14px; border-radius: var(--r); border: none; cursor: pointer;
  font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.nfcb-gold { background: var(--oro); color: var(--verde); }
.nfcb-gold:hover { background: var(--oro-l); }
.nfcb-wa { background: var(--wa); color: #fff; }
.nfcb-wa:hover { background: #1db954; }
.nfcb-ghost {
  background: transparent; border: 1px solid rgba(244,237,224,.14);
  color: rgba(244,237,224,.42); font-size: 11px; padding: 9px;
}
.nfcb-ghost:hover { color: var(--crema); border-color: rgba(244,237,224,.28); }
.nfc-stand { position: absolute; bottom: 18px; font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: rgba(244,237,224,.18); }

/* ── HERO ── */
.hero {
  min-height: 100vh; background: var(--verde);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 90px 24px 80px;
  position: relative; overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0;
  background-image: url('https://www.vivaicintoli.com/content/images/thumbs/0055795.jpeg');
  background-size: cover; background-position: center;
  opacity: .45;
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(155deg, rgba(14,26,14,.65) 0%, rgba(28,43,26,.45) 60%, rgba(46,74,40,.3) 100%);
}
.hero-content { position: relative; z-index: 2; max-width: 700px; margin: 0 auto; }
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-size: 10px; letter-spacing: .26em; text-transform: uppercase;
  color: var(--oro); font-weight: 600; margin-bottom: 24px;
}
.hero-eyebrow::before, .hero-eyebrow::after {
  content: ''; width: 22px; height: 1px; background: var(--oro); opacity: .5;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(40px,7vw,86px); font-weight: 400;
  line-height: 1.06; color: var(--crema); margin-bottom: 18px;
}
.hero h1 em { font-style: italic; color: var(--menta); }
.hero-desc {
  font-size: 14px; color: rgba(244,237,224,.52);
  max-width: 440px; margin: 0 auto 40px;
  line-height: 1.8; font-weight: 300;
}
.hero-ctas { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.btn-gold {
  padding: 14px 28px; background: var(--oro); color: var(--verde);
  border: none; border-radius: var(--r); cursor: pointer;
  font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .13em; text-transform: uppercase; transition: all .22s;
}
.btn-gold:hover { background: var(--oro-l); transform: translateY(-1px); }
.btn-ghost-light {
  padding: 14px 28px; background: transparent; color: var(--crema);
  border: 1px solid rgba(244,237,224,.22); border-radius: var(--r); cursor: pointer;
  font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 500;
  letter-spacing: .13em; text-transform: uppercase; transition: all .22s;
}
.btn-ghost-light:hover { border-color: var(--menta); color: var(--menta); }
.hero-footer {
  position: absolute; bottom: 26px; left: 26px; right: 26px; z-index: 2;
  display: flex; justify-content: space-between; align-items: flex-end;
}
.hero-info { font-size: 11px; color: rgba(244,237,224,.3); letter-spacing: .05em; line-height: 1.9; }
.hero-info strong { color: rgba(244,237,224,.6); font-weight: 500; }
.scroll-col { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.scroll-bar {
  width: 1px; height: 36px;
  background: linear-gradient(to bottom, rgba(244,237,224,.32), transparent);
  animation: scrollAnim 2s ease-in-out infinite;
}
@keyframes scrollAnim { 0%,100%{opacity:.3} 50%{opacity:.9} }
.scroll-txt { font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: rgba(244,237,224,.25); }

/* ── CATALOG ── */
.filter-bar {
  position: sticky; top: 90px; z-index: 200;
  background: rgba(250,246,238,.97); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--crema-d);
  padding: 11px 18px;
}
.filter-scroll { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; }
.filter-scroll::-webkit-scrollbar { display: none; }
.filt {
  flex-shrink: 0; padding: 7px 15px; border-radius: 20px;
  border: 1px solid var(--crema-d); background: transparent;
  font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 500;
  letter-spacing: .06em; color: var(--text-m); cursor: pointer;
  transition: all .2s; white-space: nowrap;
}
.filt:hover, .filt.on { background: var(--verde); color: var(--crema); border-color: var(--verde); }
.plant-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
  gap: 16px; padding: 22px 18px 90px;
  max-width: 1160px; margin: 0 auto;
}
.pcard {
  background: var(--avorio); border: 1px solid var(--crema-d);
  border-radius: 10px; overflow: hidden; cursor: pointer;
  transition: all .3s cubic-bezier(.34,1.2,.64,1);
}
.pcard:hover { transform: translateY(-5px); box-shadow: var(--shadow); border-color: var(--salvia); }
.pcard-img {
  aspect-ratio: 4/3; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: var(--crema);
}
.pcard-imgbg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transition: transform .4s ease;
}
.pcard:hover .pcard-imgbg { transform: scale(1.05); }
.pcard-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(14,26,14,.3) 0%, transparent 45%); }
.pcard-badges { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; z-index: 1; }
.pcard-cat {
  background: rgba(14,26,14,.7); backdrop-filter: blur(4px);
  color: var(--menta); font-size: 9px; font-weight: 700;
  letter-spacing: .13em; text-transform: uppercase;
  padding: 4px 8px; border-radius: 2px;
}
.pcard-nfc {
  background: rgba(201,168,76,.88); color: var(--verde);
  font-size: 9px; font-weight: 700; letter-spacing: .07em;
  padding: 4px 8px; border-radius: 2px;
}
.pcard-emoji { font-size: 62px; position: relative; z-index: 1; }
.pcard-body { padding: 15px; }
.pcard-name { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 500; color: var(--verde); margin-bottom: 2px; }
.pcard-latin { font-family: 'Playfair Display', serif; font-style: italic; font-size: 11px; color: var(--text-m); margin-bottom: 8px; }
.pcard-desc { font-size: 12px; color: var(--text-s); line-height: 1.6; margin-bottom: 12px; font-weight: 300; }
.pcard-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 11px; border-top: 1px solid var(--crema-d);
}
.pcard-price { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 500; color: var(--verde); }
.pcard-price span { font-size: 10px; color: var(--text-m); font-family: 'Jost', sans-serif; font-weight: 300; }
.pcard-btn {
  padding: 7px 13px; background: var(--verde); color: var(--crema);
  border: none; border-radius: 4px; cursor: pointer;
  font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 600;
  letter-spacing: .06em; transition: background .2s;
}
.pcard-btn:hover { background: var(--oliva); }

/* ── QUOTE WIZARD ── */
.quote-page { background: var(--crema); min-height: 100vh; }
.qwrap { max-width: 780px; margin: 0 auto; padding: 36px 18px 110px; }

/* Step indicator */
.steps { display: flex; align-items: flex-start; margin-bottom: 36px; }
.step-item { display: flex; align-items: center; flex: 1; }
.step-dot {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  border: 2px solid var(--crema-d); background: var(--avorio); color: var(--text-m);
  transition: all .3s; flex-shrink: 0;
}
.step-dot.done { background: var(--oliva); border-color: var(--oliva); color: #fff; }
.step-dot.active { background: var(--verde); border-color: var(--verde); color: var(--oro); }
.step-line { flex: 1; height: 2px; background: var(--crema-d); transition: background .3s; }
.step-line.done { background: var(--oliva); }
.step-lbl { font-size: 9px; letter-spacing: .07em; text-transform: uppercase; color: var(--text-m); margin-top: 5px; text-align: center; white-space: nowrap; }

/* Step panels */
.qpanel { display: none; }
.qpanel.active { display: block; }
.qpanel-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 500; color: var(--verde); margin-bottom: 5px; }
.qpanel-sub { font-size: 13px; color: var(--text-m); font-weight: 300; margin-bottom: 22px; }

/* Step 1 — plant selection */
.q1-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px,1fr)); gap: 10px; margin-bottom: 22px; }
.q1-card {
  border: 2px solid var(--crema-d); border-radius: 8px; padding: 13px;
  cursor: pointer; transition: all .24s;
  background: var(--avorio); display: flex; align-items: center; gap: 11px;
  position: relative;
}
.q1-card:hover { border-color: var(--salvia); }
.q1-card.sel { border-color: var(--verde); background: rgba(28,43,26,.04); }
.q1-emoji { font-size: 30px; flex-shrink: 0; }
.q1-name { font-family: 'Playfair Display', serif; font-size: 13px; font-weight: 500; color: var(--verde); }
.q1-latin { font-size: 10px; font-style: italic; color: var(--text-m); }
.q1-price { font-size: 11px; font-weight: 600; color: var(--oliva); margin-top: 2px; }
.q1-check {
  position: absolute; top: 7px; right: 7px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--verde); color: var(--oro);
  font-size: 10px; display: none; align-items: center; justify-content: center; font-weight: 700;
}
.q1-card.sel .q1-check { display: flex; }

/* Step 2 — quantities */
.q2-item { background: var(--avorio); border: 1px solid var(--crema-d); border-radius: 8px; padding: 16px; margin-bottom: 11px; }
.q2-head { display: flex; align-items: center; gap: 11px; margin-bottom: 13px; }
.q2-emoji { font-size: 26px; }
.q2-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 500; color: var(--verde); }
.q2-latin { font-size: 11px; font-style: italic; color: var(--text-m); }
.q2-row { display: flex; gap: 11px; align-items: center; flex-wrap: wrap; margin-bottom: 9px; }
.qty-wrap { display: flex; align-items: center; gap: 9px; }
.qty-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 2px solid var(--crema-d); background: var(--avorio); cursor: pointer;
  font-size: 17px; display: flex; align-items: center; justify-content: center;
  color: var(--verde); transition: all .2s; font-weight: 700;
}
.qty-btn:hover { background: var(--verde); color: var(--crema); border-color: var(--verde); }
.qty-val { font-size: 17px; font-weight: 700; min-width: 30px; text-align: center; color: var(--verde); }
.qty-unit { font-size: 12px; color: var(--text-m); font-weight: 300; }
.disc-pill {
  background: rgba(201,168,76,.12); border: 1px solid rgba(201,168,76,.22);
  border-radius: 4px; padding: 4px 9px; font-size: 11px; color: var(--oliva); font-weight: 700;
}
.q2-note-wrap { margin-top: 8px; }
.q2-note-wrap label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-m); font-weight: 600; display: block; margin-bottom: 4px; }
.q2-note-wrap input {
  width: 100%; padding: 9px 12px; border: 1px solid var(--crema-d);
  border-radius: 5px; font-family: 'Jost', sans-serif; font-size: 12px;
  color: var(--text); background: var(--avorio); outline: none; transition: border-color .2s;
}
.q2-note-wrap input:focus { border-color: var(--oliva); }
.q2-subtotal { text-align: right; font-family: 'Playfair Display', serif; font-size: 15px; color: var(--verde); font-weight: 500; margin-top: 6px; }

/* Step 3 — client data */
.q3-form { display: flex; flex-direction: column; gap: 14px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-m); font-weight: 600; }
.form-input {
  padding: 12px 13px; border: 1.5px solid var(--crema-d); border-radius: var(--r);
  background: var(--avorio); font-family: 'Jost', sans-serif; font-size: 14px;
  color: var(--text); outline: none; transition: border-color .2s;
}
.form-input:focus { border-color: var(--oliva); }
.form-select { appearance: none; cursor: pointer; }
.form-textarea { min-height: 78px; resize: vertical; }
.roles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px,1fr)); gap: 7px; }
.role-btn {
  padding: 10px 11px; border: 1.5px solid var(--crema-d); border-radius: var(--r);
  background: var(--avorio); cursor: pointer;
  font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 500; color: var(--text-m);
  transition: all .2s; text-align: left; display: flex; align-items: center; gap: 7px;
}
.role-btn:hover { border-color: var(--salvia); }
.role-btn.on { background: rgba(28,43,26,.05); border-color: var(--verde); color: var(--verde); }

/* Step 4 — summary */
.q4-card { background: var(--avorio); border: 1px solid var(--crema-d); border-radius: 10px; overflow: hidden; margin-bottom: 18px; box-shadow: var(--shadow); }
.q4-head { background: var(--verde); padding: 18px 22px; display: flex; align-items: center; justify-content: space-between; }
.q4-head-title { font-family: 'Playfair Display', serif; font-size: 19px; color: var(--crema); font-weight: 400; }
.q4-head-date { font-size: 11px; color: rgba(244,237,224,.45); margin-top: 2px; }
.q4-body { padding: 20px; }
.q4-client {
  background: var(--crema); border-radius: 6px; padding: 13px; margin-bottom: 16px;
  font-size: 13px; color: var(--text-s); line-height: 1.8;
}
.q4-client-name { color: var(--verde); font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 600; display: block; margin-bottom: 3px; }
.q4-item { display: flex; align-items: center; gap: 11px; padding: 10px 0; border-bottom: 1px solid var(--crema-d); }
.q4-item:last-child { border-bottom: none; }
.q4-item-emoji { font-size: 22px; flex-shrink: 0; }
.q4-item-info { flex: 1; }
.q4-item-name { font-size: 13px; font-weight: 600; color: var(--verde); }
.q4-item-latin { font-size: 11px; color: var(--text-m); font-style: italic; }
.q4-item-note { font-size: 11px; color: var(--text-m); font-style: italic; margin-top: 2px; }
.q4-item-qty { font-size: 12px; color: var(--text-s); font-weight: 500; margin-left: auto; white-space: nowrap; }
.q4-item-price { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 500; color: var(--verde); min-width: 60px; text-align: right; }
.disc-badge { background: rgba(201,168,76,.14); color: var(--oliva); font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 3px; display: inline-block; margin-top: 2px; }
.q4-total { border-top: 2px solid var(--verde); padding-top: 13px; margin-top: 12px; display: flex; justify-content: space-between; align-items: center; }
.q4-total-label { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text-m); }
.q4-total-val { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; color: var(--verde); }
.q4-notes-box { background: var(--crema); border-radius: 6px; padding: 11px 13px; font-size: 12px; color: var(--text-s); margin-top: 11px; font-style: italic; }
.q4-actions { display: flex; flex-direction: column; gap: 9px; }
.action-btn {
  width: 100%; padding: 14px; border: none; border-radius: var(--r); cursor: pointer;
  font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: .11em; text-transform: uppercase;
  transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.action-wa { background: var(--wa); color: #fff; }
.action-wa:hover { background: #1db954; }
.action-pdf { background: var(--verde); color: var(--crema); }
.action-pdf:hover { background: var(--verde-m); }
.action-email { background: var(--crema-d); color: var(--verde); }
.action-email:hover { background: var(--crema); }

/* Wizard nav buttons */
.qnav { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--crema-d); }
.btn-back {
  padding: 11px 18px; background: transparent; border: 1.5px solid var(--crema-d);
  border-radius: var(--r); cursor: pointer;
  font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 600; color: var(--text-m);
  transition: all .2s;
}
.btn-back:hover { border-color: var(--oliva); color: var(--verde); }
.btn-next {
  padding: 12px 26px; background: var(--verde); color: var(--crema);
  border: none; border-radius: var(--r); cursor: pointer;
  font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase; transition: all .2s;
}
.btn-next:hover { background: var(--verde-m); }
.btn-next:disabled { background: var(--crema-d); color: var(--text-m); cursor: not-allowed; }
.sel-count { font-size: 12px; color: var(--text-m); }

/* ── AI CHAT ── */
.ai-page { background: var(--verde); min-height: 100vh; }
.ai-wrap { max-width: 700px; margin: 0 auto; padding: 56px 18px 90px; }
.ai-title { font-family: 'Playfair Display', serif; font-size: clamp(26px,5vw,44px); font-weight: 400; color: var(--crema); text-align: center; margin-bottom: 7px; }
.ai-title em { font-style: italic; color: var(--menta); }
.ai-sub { font-size: 13px; color: rgba(244,237,224,.42); font-weight: 300; max-width: 380px; margin: 0 auto 36px; text-align: center; }
.chatbox { background: rgba(244,237,224,.04); border: 1px solid rgba(244,237,224,.09); border-radius: 12px; overflow: hidden; }
.chat-bar { background: rgba(244,237,224,.07); padding: 13px 17px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(244,237,224,.07); }
.chat-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--oliva); border: 1px solid rgba(201,168,76,.28); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.chat-avatar img { width: 20px; height: 20px; opacity: .85; }
.chat-agent-name { font-size: 12px; font-weight: 600; color: var(--crema); }
.chat-agent-status { font-size: 10px; color: var(--salvia); display: flex; align-items: center; gap: 4px; }
.status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--salvia); animation: statusPulse 2s infinite; }
@keyframes statusPulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.chat-messages { padding: 17px; min-height: 270px; max-height: 370px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(244,237,224,.11); }
.chat-msg { display: flex; gap: 8px; max-width: 88%; }
.chat-msg.user { align-self: flex-end; flex-direction: row-reverse; }
.chat-bubble { padding: 10px 13px; font-size: 13px; line-height: 1.65; font-weight: 300; border-radius: 12px; }
.chat-msg.bot .chat-bubble { background: rgba(244,237,224,.07); color: var(--crema); border-radius: 4px 12px 12px 12px; }
.chat-msg.user .chat-bubble { background: var(--oliva); color: var(--crema); border-radius: 12px 4px 12px 12px; }
.chat-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
.quick-replies { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 17px 12px; }
.qr-btn {
  padding: 7px 12px; border-radius: 20px; border: 1px solid rgba(244,237,224,.17);
  background: transparent; color: rgba(244,237,224,.62);
  font-size: 12px; cursor: pointer; font-family: 'Jost', sans-serif; transition: all .2s;
}
.qr-btn:hover { background: rgba(244,237,224,.08); color: var(--crema); border-color: rgba(244,237,224,.28); }
.chat-input-row { padding: 12px 17px; border-top: 1px solid rgba(244,237,224,.07); display: flex; gap: 9px; }
.chat-input {
  flex: 1; background: rgba(244,237,224,.07); border: 1px solid rgba(244,237,224,.12);
  border-radius: 8px; padding: 10px 13px; color: var(--crema);
  font-family: 'Jost', sans-serif; font-size: 13px; outline: none; transition: border-color .2s;
}
.chat-input::placeholder { color: rgba(244,237,224,.26); }
.chat-input:focus { border-color: var(--salvia); }
.chat-send-btn {
  padding: 10px 16px; background: var(--oro); color: var(--verde);
  border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 700;
  transition: background .2s;
}
.chat-send-btn:hover { background: var(--oro-l); }
.typing-dots { display: flex; gap: 4px; align-items: center; }
.typing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--salvia); animation: typingAnim 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay: .2s; }
.typing-dot:nth-child(3) { animation-delay: .4s; }
@keyframes typingAnim { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

/* ── BOTTOM SHEET ── */
.sheet-overlay { display: none; position: fixed; inset: 0; z-index: 700; background: rgba(14,26,14,.82); backdrop-filter: blur(10px); align-items: flex-end; justify-content: center; }
.sheet-overlay.open { display: flex; }
.sheet { background: var(--avorio); border-radius: 18px 18px 0 0; width: 100%; max-width: 520px; max-height: 88vh; overflow-y: auto; padding-bottom: 28px; animation: sheetUp .32s cubic-bezier(.34,1.4,.64,1); }
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sheet-handle { width: 34px; height: 4px; background: var(--crema-d); border-radius: 2px; margin: 12px auto; }
.sheet-top { display: flex; align-items: center; gap: 13px; padding: 0 18px 15px; border-bottom: 1px solid var(--crema-d); margin-bottom: 15px; }
.sheet-emoji { font-size: 50px; }
.sheet-plant-name { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 500; color: var(--verde); }
.sheet-plant-latin { font-family: 'Playfair Display', serif; font-style: italic; font-size: 11px; color: var(--text-m); margin-bottom: 3px; }
.sheet-plant-price { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 500; color: var(--oliva); }
.sheet-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 18px; margin-bottom: 14px; }
.sheet-spec { background: var(--crema); padding: 9px 12px; border-radius: 6px; }
.sheet-spec-label { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-m); margin-bottom: 2px; font-weight: 600; }
.sheet-spec-val { font-size: 12px; font-weight: 600; color: var(--verde); }
.sheet-desc { padding: 0 18px; font-size: 12px; color: var(--text-s); line-height: 1.7; font-weight: 300; margin-bottom: 18px; }
.sheet-actions { padding: 0 18px; display: flex; flex-direction: column; gap: 8px; }
.sheet-btn {
  width: 100%; padding: 13px; border-radius: var(--r); border: none; cursor: pointer;
  font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .09em; text-transform: uppercase;
  transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 7px;
}
.sheet-btn-main { background: var(--verde); color: var(--crema); }
.sheet-btn-main:hover { background: var(--verde-m); }
.sheet-btn-wa { background: var(--wa); color: #fff; }
.sheet-btn-wa:hover { background: #1db954; }
.sheet-btn-ghost { background: var(--crema); color: var(--text-m); border: 1px solid var(--crema-d); font-size: 11px; }
.sheet-btn-ghost:hover { background: var(--crema-d); }

/* ── DESKTOP MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; z-index: 600; background: rgba(14,26,14,.72); backdrop-filter: blur(10px); align-items: center; justify-content: center; padding: 22px; }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--avorio); border-radius: 10px; max-width: 520px; width: 100%; overflow: hidden; animation: modalIn .28s ease; box-shadow: 0 40px 100px rgba(14,26,14,.25); }
@keyframes modalIn { from{transform:scale(.94);opacity:0} to{transform:scale(1);opacity:1} }
.modal-img { height: 170px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.modal-imgbg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: .55; }
.modal-emoji { position: relative; z-index: 1; font-size: 80px; }
.modal-body { padding: 22px; }
.modal-name { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 500; color: var(--verde); }
.modal-latin { font-family: 'Playfair Display', serif; font-style: italic; font-size: 11px; color: var(--text-m); margin-bottom: 11px; }
.modal-desc { font-size: 13px; color: var(--text-s); line-height: 1.8; margin-bottom: 16px; font-weight: 300; }
.modal-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.mspec { background: var(--crema); padding: 9px 12px; border-radius: 4px; }
.mspec-label { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-m); margin-bottom: 2px; font-weight: 600; }
.mspec-val { font-size: 12px; font-weight: 600; color: var(--verde); }
.modal-foot { display: flex; gap: 9px; }
.modal-btn-close { flex: 1; padding: 11px; border: 1.5px solid var(--crema-d); background: transparent; border-radius: var(--r); cursor: pointer; font-size: 12px; color: var(--text-m); font-family: 'Jost', sans-serif; font-weight: 500; transition: all .2s; }
.modal-btn-close:hover { border-color: var(--oliva); color: var(--verde); }
.modal-btn-add { flex: 2; padding: 11px; background: var(--verde); color: var(--crema); border: none; border-radius: var(--r); cursor: pointer; font-size: 11px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; font-family: 'Jost', sans-serif; transition: background .2s; }
.modal-btn-add:hover { background: var(--verde-m); }

/* ── FOOTER ── */
footer { background: #0e1a0e; padding: 36px 22px 26px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 18px; }
.footer-logo img { height: 28px; opacity: .75; }
.footer-center { text-align: center; }
.footer-brand { font-family: 'Playfair Display', serif; font-size: 14px; color: rgba(244,237,224,.62); margin-bottom: 3px; }
.footer-stand { font-size: 9px; letter-spacing: .17em; text-transform: uppercase; color: rgba(244,237,224,.22); }
.footer-right { text-align: right; }
.footer-item { font-size: 11px; color: rgba(244,237,224,.3); line-height: 1.9; }
.footer-item a { color: rgba(244,237,224,.38); text-decoration: none; transition: color .2s; }
.footer-item a:hover { color: var(--oro); }


/* ── GALLERY ── */
.gallery-wrap { position: relative; }
.gallery-main { width: 100%; aspect-ratio: 16/9; overflow: hidden; position: relative; background: var(--crema-d); }
.gallery-main img { width: 100%; height: 100%; object-fit: cover; transition: opacity .22s; }
.gallery-main img.gfade { opacity: 0; }
.gallery-nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(28,43,26,.6); border: none; color: var(--crema); width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background .18s; z-index: 2; }
.gallery-nav-btn:hover { background: rgba(28,43,26,.9); }
.gprev { left: 10px; } .gnext { right: 10px; }
.gallery-counter { position: absolute; bottom: 8px; right: 10px; background: rgba(0,0,0,.45); color: #fff; font-size: 10px; padding: 3px 9px; border-radius: 20px; z-index: 2; }
.gallery-thumbs { display: flex; gap: 6px; padding: 8px 12px; overflow-x: auto; scrollbar-width: none; background: var(--crema-d); }
.gallery-thumbs::-webkit-scrollbar { display: none; }
.g-thumb { width: 56px; height: 42px; border-radius: 4px; overflow: hidden; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; transition: border-color .18s; }
.g-thumb.active { border-color: var(--oro); }
.g-thumb img { width: 100%; height: 100%; object-fit: cover; }
/* ── ENRICHED BADGES / PILLS ── */
.avail-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; padding: 4px 11px; border-radius: 20px; letter-spacing: .04em; }
.avail-yes  { background: rgba(74,103,65,.12); color: var(--oliva); }
.avail-soon { background: rgba(139,111,71,.12); color: #8b6f47; }
.avail-order{ background: rgba(28,43,26,.08);   color: var(--text-s); }
.cert-pill { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 20px; background: rgba(74,103,65,.08); border: 1px solid var(--salvia); color: var(--oliva); }
.info-grid-6 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.info-cell { background: var(--crema); border-radius: var(--r); padding: 9px 12px; border: 1px solid var(--crema-d); }
.info-cell-label { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-m); margin-bottom: 3px; font-weight: 600; }
.info-cell-val { font-size: 12px; font-weight: 500; color: var(--verde); }
.sizes-section { margin-bottom: 16px; }
.sizes-lbl { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-m); margin-bottom: 8px; font-weight: 600; }
.sizes-pills { display: flex; gap: 7px; flex-wrap: wrap; }
.size-pill { padding: 7px 12px; border-radius: 20px; border: 1.5px solid var(--crema-d); background: var(--avorio); font-size: 11px; cursor: pointer; transition: all .18s; color: var(--text); display: flex; flex-direction: column; align-items: center; }
.size-pill:hover { border-color: var(--salvia); }
.size-pill.active { background: var(--verde); color: var(--crema); border-color: var(--verde); }
.size-pill .sp-sub { font-size: 9px; opacity: .65; margin-top: 1px; }
.size-pill .sp-price { font-size: 10px; font-weight: 700; margin-top: 2px; }
.selected-price { display: flex; align-items: baseline; gap: 6px; margin-bottom: 16px; }
.sp-main { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: var(--verde); }
.sp-sub-txt { font-size: 11px; color: var(--text-m); }
.delivery-bar { display: flex; align-items: center; gap: 9px; background: rgba(74,103,65,.06); border: 1px solid rgba(74,103,65,.18); border-radius: var(--r); padding: 10px 14px; margin-bottom: 18px; font-size: 12px; color: var(--text-s); }
.delivery-bar-icon { font-size: 15px; flex-shrink: 0; }
.enriched-actions { display: flex; gap: 9px; flex-wrap: wrap; }
@media (max-width: 420px) { .info-grid-6 { grid-template-columns: 1fr; } .gallery-main { aspect-ratio: 4/3; } }

/* ── TABLET (max 900px) ── */
@media (max-width: 900px) {
  .nav-nfc { display: none; }
  .plant-grid { grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); }
  .q1-grid { grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); }
  .roles-grid { grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); }
  .ai-wrap { padding: 40px 20px 80px; }
}

/* ── MOBILE (max 700px) ── */
@media (max-width: 700px) {
  /* Nav */
  nav { padding: 0 14px; height: 52px; }
  .nav-links .nl:not(.nl-cta) { display: none; }
  .nav-sub { display: none; }
  .nav-nfc { display: none; }
  .nl-cta { padding: 6px 10px; font-size: 10px; }

  /* Bottom bar with safe area for notch */
  .bbar { display: flex; padding-bottom: env(safe-area-inset-bottom, 0px); height: calc(58px + env(safe-area-inset-bottom, 0px)); }
  .ptb { padding-top: 86px; padding-bottom: calc(68px + env(safe-area-inset-bottom, 0px)); }
  .pt  { padding-top: 86px; }

  /* Hero */
  .hero { padding: 86px 20px 70px; }
  .hero h1 { font-size: clamp(36px, 9vw, 56px); margin-bottom: 14px; }
  .hero-desc { font-size: 13px; margin-bottom: 32px; }
  .hero-eyebrow { font-size: 9px; letter-spacing: .18em; margin-bottom: 18px; }
  .hero-eyebrow::before, .hero-eyebrow::after { width: 14px; }
  .hero-footer { display: none; }
  .hero-ctas { gap: 10px; }
  .btn-gold, .btn-ghost-light { padding: 12px 22px; font-size: 11px; }

  /* Catalog */
  .filter-bar { top: 86px; padding: 9px 12px; }
  .plant-grid { grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 12px 80px; }
  .pcard-name { font-size: 14px; }
  .pcard-body { padding: 11px; }
  .pcard-desc { display: none; }
  .pcard-price { font-size: 14px; }

  /* Quote wizard */
  .qwrap { padding: 20px 12px 100px; }

  /* Steps — compact on mobile */
  .steps { margin-bottom: 24px; }
  .step-lbl { display: none; }
  .step-dot { width: 26px; height: 26px; font-size: 11px; }

  /* Step 1 grid */
  .q1-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .q1-card { padding: 10px; gap: 8px; }
  .q1-emoji { font-size: 24px; }
  .q1-name { font-size: 12px; }
  .q1-latin { display: none; }

  /* Step 2 */
  .q2-item { padding: 13px; }
  .qty-btn { width: 30px; height: 30px; font-size: 15px; }

  /* Step 3 */
  .form-row { grid-template-columns: 1fr; }
  .roles-grid { grid-template-columns: 1fr 1fr; }
  .form-input { font-size: 16px; } /* prevent iOS zoom */

  /* Step 4 summary */
  .q4-item { gap: 8px; }
  .q4-item-emoji { font-size: 18px; }
  .q4-item-name { font-size: 12px; }
  .q4-item-latin { display: none; }
  .q4-item-qty { font-size: 11px; }
  .q4-item-price { font-size: 13px; min-width: 48px; }
  .q4-total-val { font-size: 22px; }
  .q4-actions { gap: 8px; }
  .action-btn { padding: 13px; font-size: 11px; }

  /* Chat */
  .chat-messages { min-height: 220px; max-height: 300px; }
  .ai-wrap { padding: 28px 14px 80px; }
  .ai-title { font-size: clamp(22px,6vw,36px); }

  /* Modals */
  .modal-overlay { padding: 12px; }
  .modal-box { max-width: 100%; }

  /* Footer */
  footer { grid-template-columns: 1fr; text-align: center; padding: 28px 16px 20px; }
  .footer-right { text-align: center; }
  .footer-logo { display: none; }

  /* NFC overlay */
  .nfc-rings { width: 90px; height: 90px; margin-bottom: 24px; }
  .nfc-ring:nth-child(1) { width: 90px; height: 90px; }
  .nfc-ring:nth-child(2) { width: 90px; height: 90px; animation-delay: .8s; }
  .nfc-ring:nth-child(3) { width: 90px; height: 90px; animation-delay: 1.6s; }
  .nfc-center { width: 90px; height: 90px; }
  .nfc-center img { height: 42px; }
}

/* ── SMALL MOBILE (max 420px) ── */
@media (max-width: 420px) {
  .plant-grid { grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px 10px 80px; }
  .q1-grid { grid-template-columns: 1fr; }

function tr(key) {
  var t = TRANSLATIONS[currentLang];
  if (t && t[key] !== undefined) return t[key];
  return TRANSLATIONS.it[key] || key;
}

function plantName(p) {
  var n = p.name;
  return (typeof n === 'object') ? (n[currentLang] || n.it) : n;
}

function plantDesc(p) {
  var d = p.desc;
  return (typeof d === 'object') ? (d[currentLang] || d.it) : d;
}

function setLang(l) {
  currentLang = l;
  document.querySelectorAll('.lb').forEach(function(b) {
    b.classList.toggle('on', b.textContent === l.toUpperCase());

  document.documentElement.lang = l;
  applyTranslations();

}

function showNFC() {
  // Detect and apply browser language before showing overlay
  var detectedLang = detectBrowserLang();
  if (detectedLang !== currentLang) {
    setLang(detectedLang);
  } else {
    applyTranslations();
  }
  document.getElementById('nfc-overlay').classList.add('open');
}
function closeNFC() {
  document.getElementById('nfc-overlay').classList.remove('open');
}

function showPage(pageId) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('page-' + pageId).classList.add('active');

  var navIds = ['home', 'catalog', 'quote', 'ai'];
  document.querySelectorAll('.nl').forEach(function(el, i) {
    el.classList.toggle('on', navIds[i] === pageId);
  });
  var bbIds = ['bb-home', 'bb-cat', 'bb-quote', 'bb-ai'];
  var bbPages = ['home', 'catalog', 'quote', 'ai'];
  bbIds.forEach(function(id, i) {
    var el = document.getElementById(id);
    if (el) el.classList.toggle('on', bbPages[i] === pageId);
  });

  window.scrollTo(0, 0);

  if (pageId === 'catalog') { renderFilters(); renderGrid(); }
  if (pageId === 'quote') { renderQ1Grid(); renderRoles(); updateStepUI(); }
  if (pageId === 'ai') { initChat(); }
}

var CATS = ['albero','fiore','frutto','arbusto','palma','aromatica','succulenta','rampicante'];

function renderFilters() {
  var container = document.getElementById('filter-container');
  if (!container) return;
  var items = [{ k:'all', l: tr('cat_all') }];
  CATS.forEach(function(c) { items.push({ k:c, l: tr('cat_' + c) }); });
  container.innerHTML = items.map(function(item) {
    var active = item.k === activeFilter ? ' on' : '';
    return '<button class="filt' + active + '" onclick="setFilter(\'' + item.k + '\', this)">' + item.l + '</button>';
  }).join('');
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filt').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
  renderGrid();
}

function plantSizeLbl(s) {
  var lbl = s.label;
  return typeof lbl === 'object' ? (lbl[currentLang] || lbl.it) : lbl;
}
function plantDelivery(p) {
  var d = p.delivery;
  if (!d) return '';
  return typeof d === 'object' ? (d[currentLang] || d.it) : d;
}
function availBadge(avail) {
  var map = { pronto: 'avail_yes', soon: 'avail_soon', order: 'avail_order' };
  var cls = { pronto: 'avail-yes', soon: 'avail-soon', order: 'avail-order' };
  var key = map[avail] || 'avail_order';
  return '<span class="avail-badge ' + (cls[avail] || 'avail-order') + '">' + tr(key) + '</span>';
}
function certPills(certs) {
  if (!certs || !certs.length) return '';
  return certs.map(function(c) { return '<span class="cert-pill">' + c + '</span>'; }).join('');
}
function setGalleryPhoto(idx, p) {
  activeGalleryPhoto = idx;
  var img = document.getElementById('gallery-main-img');
  if (img) {
    img.classList.add('gfade');
    setTimeout(function() {
      img.src = p.photos[idx];
      img.classList.remove('gfade');
    }, 120);
  }
  document.querySelectorAll('.g-thumb').forEach(function(t, i) {
    t.classList.toggle('active', i === idx);
  });
  var ctr = document.getElementById('gallery-ctr');
  if (ctr) ctr.textContent = (idx + 1) + ' / ' + p.photos.length;
}
function prevPhoto(p) { setGalleryPhoto((activeGalleryPhoto - 1 + p.photos.length) % p.photos.length, p); }
function nextPhoto(p) { setGalleryPhoto((activeGalleryPhoto + 1) % p.photos.length, p); }
function selectSize(idx, p) {
  activeSize = idx;
  document.querySelectorAll('.size-pill').forEach(function(el, i) { el.classList.toggle('active', i === idx); });
  var priceEl = document.getElementById('selected-price-main');
  var descEl = document.getElementById('selected-price-sub');
  if (priceEl) priceEl.textContent = p.sizes[idx].price + ' €';
  if (descEl) descEl.textContent = '/ ' + tr('qty_lbl').toLowerCase() + ' · ' + p.sizes[idx].desc;
}
function buildGallery(p) {
  activeGalleryPhoto = 0;
  var photos = p.photos || [p.img];
  var thumbs = photos.length > 1
    ? '<div class="gallery-thumbs">' + photos.map(function(src, i) {
        return '<div class="g-thumb' + (i === 0 ? ' active' : '') + '" onclick="setGalleryPhoto(' + i + ', PLANTS.find(function(x){return x.id==' + p.id + ';}))">'
          + '<img src="' + src + '" loading="lazy"></div>';
      }).join('') + '</div>'
    : '';
  var navBtns = photos.length > 1
    ? '<button class="gallery-nav-btn gprev" onclick="prevPhoto(PLANTS.find(function(x){return x.id==' + p.id + ';}))">&lsaquo;</button>'
      + '<button class="gallery-nav-btn gnext" onclick="nextPhoto(PLANTS.find(function(x){return x.id==' + p.id + ';}))">&rsaquo;</button>'
    : '';
  return '<div class="gallery-wrap">'
    + '<div class="gallery-main">'
    + '<img id="gallery-main-img" src="' + photos[0] + '" alt="' + plantName(p) + '">'
    + navBtns
    + (photos.length > 1 ? '<div class="gallery-counter" id="gallery-ctr">1 / ' + photos.length + '</div>' : '')
    + '</div>'
    + thumbs
    + '</div>';
}
function buildInfoGrid(p) {
  var specs = [
    { k: 'spec_h',    v: p.specs ? p.specs.h    : p.h  },
    { k: 'spec_w',    v: p.specs ? p.specs.w    : p.w  },
    { k: 'spec_cl',   v: p.specs ? p.specs.cl   : p.cl },
    { k: 'spec_luce', v: p.specs ? p.specs.luce : '-'  },
    { k: 'spec_s',    v: p.specs ? p.specs.s    : p.s  },
    { k: 'spec_cat',  v: tr('cat_' + p.cat)            }
  ];
  return '<div class="info-grid-6">' + specs.map(function(s) {
    return '<div class="info-cell">'
      + '<div class="info-cell-label">' + tr(s.k) + '</div>'
      + '<div class="info-cell-val">' + (s.v || '-') + '</div>'
      + '</div>';
  }).join('') + '</div>';
}
function buildSizes(p) {
  if (!p.sizes || !p.sizes.length) return '';
  activeSize = 1 < p.sizes.length ? 1 : 0;
  var pills = p.sizes.map(function(s, i) {
    return '<div class="size-pill' + (i === activeSize ? ' active' : '') + '" onclick="selectSize(' + i + ', PLANTS.find(function(x){return x.id==' + p.id + ';}))">'
      + '<span>' + plantSizeLbl(s) + '</span>'
      + '<span class="sp-sub">' + s.desc + '</span>'
      + '<span class="sp-price">' + s.price + ' €</span>'
      + '</div>';
  }).join('');
  var curSize = p.sizes[activeSize];
  return '<div class="sizes-section">'
    + '<div class="sizes-lbl">' + tr('sizes_lbl') + '</div>'
    + '<div class="sizes-pills">' + pills + '</div>'
    + '</div>'
    + '<div class="selected-price">'
    + '<span class="sp-main" id="selected-price-main">' + curSize.price + ' €</span>'
    + '<span class="sp-sub-txt" id="selected-price-sub">/ ' + tr('qty_lbl').toLowerCase() + ' · ' + curSize.desc + '</span>'
    + '</div>';
}

function renderGrid() {
  var grid = document.getElementById('plant-grid');
  if (!grid) return;
  var list = activeFilter === 'all' ? PLANTS : PLANTS.filter(function(p) { return p.cat === activeFilter; });
  grid.innerHTML = list.map(function(p) {
    var avail = p.avail || 'pronto';
    var availCls = avail === 'pronto' ? 'avail-yes' : avail === 'soon' ? 'avail-soon' : 'avail-order';
    var availKey = avail === 'pronto' ? 'avail_yes' : avail === 'soon' ? 'avail_soon' : 'avail_order';
    var minPrice = p.sizes ? p.sizes[0].price : p.price;
    var certHtml = (p.certs && p.certs[0]) ? '<span class="cert-pill" style="font-size:9px;padding:2px 7px;">' + p.certs[0] + '</span>' : '';
    var bg = CAT_COLORS[p.cat] || '#f0ece4';
    var imgStyle = p.img ? 'background-image:url(' + p.img + ');' : '';
    var descShort = plantDesc(p).slice(0, 80) + '...';
    return '<div class="pcard" onclick="openCard(' + p.id + ')">'
      + '<div class="pcard-img" style="background:' + bg + '">'
      + '<div class="pcard-imgbg" style="' + imgStyle + '"></div>'
      + '<div class="pcard-overlay"></div>'
      + '<div class="pcard-badges">'
      + '<div class="pcard-cat">' + tr('cat_' + p.cat) + '</div>'
      + '<div class="pcard-nfc" style="background:rgba(201,168,76,.88);color:#1c2b1a;">&#x2B21; NFC</div>'
      + '</div>'
      + '<div class="pcard-emoji" style="display:' + (p.img ? 'none' : 'block') + '">' + p.emoji + '</div>'
      + '<div style="position:absolute;bottom:8px;left:10px;display:flex;gap:5px;z-index:1;">'
      + '<span class="avail-badge ' + availCls + '" style="font-size:9px;padding:3px 8px;">' + tr(availKey) + '</span>'
      + certHtml
      + '</div>'
      + '</div>'
      + '<div class="pcard-body">'
      + '<div class="pcard-name">' + plantName(p) + '</div>'
      + '<div class="pcard-latin">' + p.latin + '</div>'
      + '<div class="pcard-desc">' + descShort + '</div>'
      + '<div class="pcard-foot">'
      + '<div class="pcard-price">' + tr('from_lbl') + ' ' + minPrice + '&euro; <span>/ pz</span></div>'
      + '<button class="pcard-btn">' + tr('btn_view') + '</button>'
      + '</div>'
      + '</div>'
      + '</div>';
  }).join('');
}

function openCard(plantId) {
  var p = PLANTS.find(function(x) { return x.id === plantId; });
  if (!p) return;
  activeGalleryPhoto = 0;
  activeSize = p.sizes && p.sizes.length > 1 ? 1 : 0;
  if (window.innerWidth < 680) { openSheet(p); } else { openModalBox(p); }
}

function closeSheet(e) {

/* ── MODAL (desktop) ── */
function openModalBox(p) {
  document.getElementById('modal-content').innerHTML = buildSheetHTML(p);

}
function closeModal(e) {

}

/* ── QUOTE WIZARD ── */
function addToQuote(plantId) {
  if (quoteItems[plantId]) {
    quoteItems[plantId].qty += 1;
  } else {
    var p = PLANTS.find(function(x) { return x.id === plantId; });
    var price = p && p.sizes ? p.sizes[activeSize < p.sizes.length ? activeSize : 0].price : p.price;
    quoteItems[plantId] = { qty: 1, note: '', price: price, sizeIdx: activeSize };
  }
}

function getDiscount(qty) {
  if (qty >= 100) return 0.30;
  if (qty >= 50)  return 0.20;
  if (qty >= 10)  return 0.10;
  return 0;
}

function renderQ1Grid() {
  var grid = document.getElementById('q1-grid');
  if (!grid) return;
  grid.innerHTML = PLANTS.map(function(p) {
    var sel = quoteItems[p.id] ? ' sel' : '';
    var chk = quoteItems[p.id] ? 'display:flex' : 'display:none';
    var minPrice = p.sizes ? p.sizes[0].price : p.price;
    return '<div class="q1-card' + sel + '" onclick="toggleQ1(' + p.id + ', this)">'
      + '<div class="q1-emoji">' + p.emoji + '</div>'
      + '<div>'
      + '<div class="q1-name">' + plantName(p) + '</div>'
      + '<div class="q1-latin">' + p.latin + '</div>'
      + '<div class="q1-price">' + tr('from_lbl') + ' ' + minPrice + '&euro;/pz</div>'
      + '</div>'
      + '<div class="q1-check" style="' + chk + '">&check;</div>'
      + '</div>';
  }).join('');
  updateSelCountDisplay();
}

function toggleQ1(plantId, el) {
  if (quoteItems[plantId]) {
    delete quoteItems[plantId];
    el.classList.remove('sel');
    el.querySelector('.q1-check').style.display = 'none';
  } else {
    var p = PLANTS.find(function(x) { return x.id === plantId; });
    var price = p && p.sizes ? p.sizes[0].price : p.price;
    quoteItems[plantId] = { qty: 1, note: '', price: price, sizeIdx: 0 };
    el.classList.add('sel');
    el.querySelector('.q1-check').style.display = 'flex';
  }
  updateSelCountDisplay();
}

function updateSelCountDisplay() {
  var n = Object.keys(quoteItems).length;
  var el = document.getElementById('sel-count');
  if (el) el.innerHTML = n > 0 ? tr('sel_n')(n) : tr('sel_none');
  var btn = document.getElementById('btn-step1-next');
  if (btn) btn.disabled = n === 0;
}

function renderQ2Items() {
  var container = document.getElementById('q2-items');
  if (!container) return;
  var ids = Object.keys(quoteItems);
  if (!ids.length) { container.innerHTML = ''; return; }
  container.innerHTML = ids.map(function(id) {
    var p = PLANTS.find(function(x) { return x.id == id; });
    if (!p) return '';
    var item = quoteItems[id];
    var disc = getDiscount(item.qty);
    var unitPrice = item.price || (p.sizes ? p.sizes[0].price : p.price);
    var sub = Math.round(unitPrice * (1 - disc) * item.qty);
    var discHtml = disc > 0
      ? '<div class="disc-pill" id="disc-' + id + '">' + tr('disc' + Math.round(disc * 100)) + '</div>'
      : '<div id="disc-' + id + '" style="display:none"></div>';
    return '<div class="q2-item">'
      + '<div class="q2-head"><div class="q2-emoji">' + p.emoji + '</div>'
      + '<div><div class="q2-name">' + plantName(p) + '</div><div class="q2-latin">' + p.latin + '</div></div></div>'
      + '<div class="q2-row">'
      + '<div class="qty-wrap">'
      + '<button class="qty-btn" onclick="changeQty(' + id + ', -1)">&#8722;</button>'
      + '<div class="qty-val" id="qty-' + id + '">' + item.qty + '</div>'
      + '<button class="qty-btn" onclick="changeQty(' + id + ', 1)">+</button>'
      + '<div class="qty-unit">' + tr('qty_lbl') + '</div>'
      + '</div>' + discHtml
      + '</div>'
      + '<div class="q2-note-wrap"><label>' + tr('note_ph') + '</label>'
      + '<input type="text" value="' + (item.note || '') + '" placeholder="' + tr('note_ph') + '" oninput="quoteItems[' + id + '].note = this.value"></div>'
      + '<div class="q2-subtotal" id="sub-' + id + '">' + tr('subtotal') + ': ' + sub + '&euro;</div>'
      + '</div>';
  }).join('');
}

function changeQty(plantId, delta) {
  if (!quoteItems[plantId]) return;
  quoteItems[plantId].qty = Math.max(1, quoteItems[plantId].qty + delta);
  var item = quoteItems[plantId];
  var p = PLANTS.find(function(x) { return x.id == plantId; });
  var unitPrice = item.price || (p.sizes ? p.sizes[0].price : p.price);
  var disc = getDiscount(item.qty);
  var sub = Math.round(unitPrice * (1 - disc) * item.qty);
  var qv = document.getElementById('qty-' + plantId);
  if (qv) qv.textContent = item.qty;
  var dd = document.getElementById('disc-' + plantId);
  if (dd) { dd.innerHTML = disc > 0 ? tr('disc' + Math.round(disc * 100)) : ''; dd.style.display = disc > 0 ? 'block' : 'none'; }
  var sd = document.getElementById('sub-' + plantId);
  if (sd) sd.innerHTML = tr('subtotal') + ': ' + sub + '&euro;';
}

function renderRoles() {
  var grid = document.getElementById('roles-grid');
  if (!grid) return;
  var roles = tr('roles');
  grid.innerHTML = roles.map(function(role) {
    var on = clientData.role === role ? ' on' : '';
    var esc = role.replace(/'/g, '&#39;');
    return '<button class="role-btn' + on + '" onclick="selectRole(\'' + esc + '\')">' + role + '</button>';
  }).join('');
}

function selectRole(role) {
  clientData.role = role;
  document.querySelectorAll('.role-btn').forEach(function(b) {
    b.classList.toggle('on', b.innerHTML === role);
  });
}

function renderQ4Summary() {
  var d = new Date();
  var dateStr = d.toLocaleDateString(currentLang, { day: 'numeric', month: 'long', year: 'numeric' });
  document.getElementById('q4-date').textContent = dateStr;
  clientData.name    = document.getElementById('c-name').value;
  clientData.company = document.getElementById('c-company').value;
  clientData.email   = document.getElementById('c-email').value;
  clientData.phone   = document.getElementById('c-phone').value;
  clientData.country = document.getElementById('c-country').value;
  clientData.notes   = document.getElementById('c-notes').value;
  var cd = clientData;
  document.getElementById('q4-client').innerHTML =
    '<span class="q4-client-name">' + (cd.name || '&mdash;') + (cd.company ? ' &middot; ' + cd.company : '') + '</span>'
    + (cd.email ? cd.email + '<br>' : '')
    + (cd.phone ? cd.phone + '<br>' : '')
    + (cd.country ? cd.country + '<br>' : '')
    + (cd.role || '');
  var total = 0;
  document.getElementById('q4-items-list').innerHTML = Object.keys(quoteItems).map(function(id) {
    var p = PLANTS.find(function(x) { return x.id == id; });
    if (!p) return '';
    var item = quoteItems[id];
    var unitPrice = item.price || (p.sizes ? p.sizes[0].price : p.price);
    var disc = getDiscount(item.qty);
    var price = Math.round(unitPrice * (1 - disc) * item.qty);
    total += price;
    var discBadge = disc > 0 ? '<span class="disc-badge">' + tr('disc_lbl') + ' &minus;' + Math.round(disc * 100) + '%</span>' : '';
    var noteHtml = item.note ? '<div class="q4-item-note">&#8212; ' + item.note + '</div>' : '';
    return '<div class="q4-item">'
      + '<div class="q4-item-emoji">' + p.emoji + '</div>'
      + '<div class="q4-item-info">'
      + '<div class="q4-item-name">' + plantName(p) + '</div>'
      + '<div class="q4-item-latin">' + p.latin + '</div>'
      + noteHtml + discBadge
      + '</div>'
      + '<div class="q4-item-qty">' + item.qty + ' pz</div>'
      + '<div class="q4-item-price">' + price + '&euro;</div>'
      + '</div>';
  }).join('');
  document.getElementById('q4-total-val').innerHTML = '&euro; ' + total.toLocaleString('it-IT', { minimumFractionDigits: 2 });
  var nb = document.getElementById('q4-notes-box');
  if (cd.notes) { nb.textContent = cd.notes; nb.style.display = 'block'; }
  else { nb.style.display = 'none'; }
}

function goStep(n) {
  if (n === 2) {
    if (Object.keys(quoteItems).length === 0) { alert(tr('sel_none')); return; }
    renderQ2Items();
  }
  if (n === 4) {
    if (!document.getElementById('c-email').value) { alert('Email required'); return; }
    renderQ4Summary();
  }
  currentStep = n;
  updateStepUI();
  window.scrollTo(0, 0);
}

function updateStepUI() {
  for (var i = 1; i <= 4; i++) {
    var dot = document.getElementById('step-dot-' + i);
    var line = document.getElementById('step-line-' + i);
    var panel = document.getElementById('panel-' + i);
    if (dot) { dot.classList.toggle('active', i === currentStep); dot.classList.toggle('done', i < currentStep); }
    if (line) line.classList.toggle('done', i < currentStep);
    if (panel) panel.classList.toggle('active', i === currentStep);
  }
}

function resetQuote() {
  quoteItems = {};
  clientData = {};
  currentStep = 1;
  renderQ1Grid();
  renderRoles();
  updateStepUI();
}

function buildWAMessage() {
  var cd = clientData;
  var ref = 'VC-' + Date.now().toString().slice(-6);
  var lines = [];
  lines.push('\uD83C\uDF3F *VIVAI CINTOLI*');
  lines.push(waPlainText('stand'));
  lines.push('');
  lines.push('\uD83D\uDCCB ' + waPlainText('q_ref') + ': ' + ref);
  if (cd.name) {
    var cl = '\uD83D\uDC64 ' + cd.name;
    if (cd.company) cl += ' (' + cd.company + ')';
    if (cd.country) cl += ' \u00b7 ' + cd.country;
    lines.push(cl);
  }
  if (cd.email) lines.push('\u2709 ' + cd.email);
  if (cd.phone) lines.push('\uD83D\uDCDE ' + cd.phone);
  if (cd.role)  lines.push('\uD83C\uDFF7 ' + cd.role);
  lines.push('');
  var total = 0;
  Object.keys(quoteItems).forEach(function(id) {
    var p = PLANTS.find(function(x) { return x.id == id; });
    if (!p) return;
    var item = quoteItems[id];
    var unitPrice = item.price || (p.sizes ? p.sizes[0].price : p.price);
    var disc = getDiscount(item.qty);
    var price = Math.round(unitPrice * (1 - disc) * item.qty);
    total += price;
    var discStr = disc > 0 ? ' (-' + Math.round(disc * 100) + '%)' : '';
    lines.push('\u2022 ' + plantName(p) + ' \u00d7' + item.qty + discStr + ' = ' + price + ' \u20ac');
    if (item.note) lines.push('  \uD83D\uDCDD ' + item.note);
  });
  lines.push('');
  lines.push('\uD83D\uDCB0 *' + waPlainText('total_lbl') + ': ' + total + ' \u20ac*');
  if (cd.notes) { lines.push(''); lines.push('\uD83D\uDCCB ' + waPlainText('note_lbl') + ': ' + cd.notes); }
  lines.push('');
  lines.push('_Vivai Cintoli \u00b7 ' + waPlainText('q_stand') + '_');
  return lines.join('\n');
}

function sendWA() {
  var msg = buildWAMessage();
  window.open('https://wa.me/' + WA_NUMBER + '?text=' + encodeURIComponent(msg), '_blank');
}

function waAskPlant(plantId) {
  var p = PLANTS.find(function(x) { return x.id === plantId; });

    '\uD83C\uDF3F Vivai Cintoli',

/* ── EMAIL ── */
function sendEmail() {
  var cd = clientData;
  var subject = tr('q4_t');
  var body = tr('q4_t') + '\n' + waPlainText('q_stand') + '\n\n';
  if (cd.name) body += waPlainText('q_by') + ': ' + cd.name + (cd.company ? ' (' + cd.company + ')' : '') + '\n\n';
  body += '---\n';
  var total = 0;
  Object.keys(quoteItems).forEach(function(id) {
    var p = PLANTS.find(function(x) { return x.id == id; });
    if (!p) return;
    var item = quoteItems[id];
    var unitPrice = item.price || (p.sizes ? p.sizes[0].price : p.price);
    var disc = getDiscount(item.qty);
    var price = Math.round(unitPrice * (1 - disc) * item.qty);
    total += price;
    body += plantName(p) + ' x' + item.qty + (disc > 0 ? ' (-' + Math.round(disc*100) + '%)' : '') + ': EUR ' + price + '\n';
  });
  body += '---\n' + waPlainText('total_lbl') + ': EUR ' + total + '\n\n' + (cd.notes || '');
  window.location.href = 'mailto:vivaicintolisrl@gmail.com?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
}

/* ── AI CHAT ── */
function initChat() {
  if (chatReady) return;
  chatReady = true;
  var greetings = {
    it: "Buongiorno! Sono Flora, il consulente digitale di Vivai Cintoli.\n\nAbbiamo oltre 800 specie di piante mediterranee — ulivi e carrubi secolari, palme, agrumi, aromatiche e molto altro. Di che tipo di progetto si tratta?",
    en: "Good day! I'm Flora, Vivai Cintoli's digital consultant.\n\nWe have over 800 Mediterranean plant species. What type of project are you working on?",
    hr: "Dobar dan! Ja sam Flora, digitalni savjetnik Vivai Cintoli.\n\nImamo vise od 800 vrsta mediteranskog bilja. Koji tip projekta realizirate?",
    de: "Guten Tag! Ich bin Flora, der Berater von Vivai Cintoli.\n\nWir haben uber 800 Mittelmeer-Pflanzenarten. Welche Art von Projekt planen Sie?"
  };
  var opts = {
    it: ['Giardino privato / villa', 'Parco pubblico', 'Hotel / resort', 'Progetto professionale'],
    en: ['Private garden / villa', 'Public park', 'Hotel / resort', 'Professional project'],
    hr: ['Privatni vrt / vila', 'Javni park', 'Hotel / resort', 'Profesionalni projekt'],
    de: ['Privatgarten / Villa', 'Oeffentlicher Park', 'Hotel / Resort', 'Berufliches Projekt']
  };
  setTimeout(function() { addBotMessage(greetings[currentLang] || greetings.en, opts[currentLang] || opts.en); }, 700);
}

function addBotMessage(text, options) {
  options = options || [];
  var msgs = document.getElementById('chat-messages');
  var div = document.createElement('div');
  div.className = 'chat-msg bot';
  div.innerHTML = '<div class="chat-icon" style="font-size:16px;opacity:.7;">&#9674;</div><div class="chat-bubble"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  setTimeout(function() {
    div.querySelector('.chat-bubble').innerHTML = text.replace(/\n/g, '<br>');
    msgs.scrollTop = msgs.scrollHeight;
    var qr = document.getElementById('quick-replies');
    qr.innerHTML = options.map(function(o) {
      return '<button class="qr-btn" onclick="sendQuickReply(this.textContent)">' + o + '</button>';
    }).join('');
  }, 1100);
}

function addUserMessage(text) {
  var msgs = document.getElementById('chat-messages');
  var div = document.createElement('div');
  div.className = 'chat-msg user';
  div.innerHTML = '<div class="chat-bubble">' + text + '</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  document.getElementById('quick-replies').innerHTML = '';
}

function sendMsg() {
  var inp = document.getElementById('chat-input');
  var text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  addUserMessage(text);
  handleChatInput(text);
}

function sendQuickReply(text) { addUserMessage(text); handleChatInput(text); }

function handleChatInput(text) {
  var low = text.toLowerCase();
  if (chatState === 'start') {
    chatCtx.project = text; chatState = 'clima';
    var opts = { it:['Italia meridionale / Sicilia','Italia centro-nord','Croazia / Balcani','Europa centrale','Clima caldo/arido'], en:['South Italy / Sicily','Central/North Italy','Croatia / Balkans','Central Europe','Hot/arid climate'], hr:['Juzna Italija / Sicilija','Centralna Italija','Hrvatska / Balkani','Srednja Europa','Vruca klima'], de:['Sueditalien / Sizilien','Mittel-/Norditalien','Kroatien / Balkan','Mitteleuropa','Heisses Klima'] };
    var msgs = { it:'Perfetto! In quale zona climatica si trova il progetto?', en:'Great! What climate zone?', hr:'Izvrsno! Koja klimatska zona?', de:'Gut! Welche Klimazone?' };
    addBotMessage(msgs[currentLang] || msgs.en, opts[currentLang] || opts.en);
  } else if (chatState === 'clima') {
    chatCtx.climate = text; chatState = 'uso';
    var opts2 = { it:['Ornamentale / scenografico','Privacy e siepi','Frutteto / produzione','Giardino arido / xerofita','Parco formale'], en:['Ornamental / scenic','Privacy & hedges','Orchard / production','Dry garden','Formal park'], hr:['Ukrasno','Privatnost i zivice','Vocnjak','Suhi vrt','Formalni park'], de:['Dekorativ','Sichtschutz & Hecken','Obstgarten','Trockengarten','Formaler Park'] };
    var msgs2 = { it:'Quale sara la funzione principale?', en:'What will be the main function?', hr:'Koja ce biti glavna funkcija?', de:'Was wird die Hauptfunktion sein?' };
    addBotMessage(msgs2[currentLang] || msgs2.en, opts2[currentLang] || opts2.en);
  } else if (chatState === 'uso') {
    chatCtx.use = text; chatState = 'budget';
    var msgs3 = { it:'Budget indicativo per pianta?', en:'Approximate budget per plant?', hr:'Okvirni budzet po biljci?', de:'Ungefaehres Budget pro Pflanze?' };
    addBotMessage(msgs3[currentLang] || msgs3.en, ['< 20 EUR', '20-80 EUR', '80-300 EUR', '> 300 EUR']);
  } else if (chatState === 'budget') {
    chatCtx.budget = text; chatState = 'done';
    var ctx = JSON.stringify(chatCtx).toLowerCase();

    // Map context to plant IDs
    var recIds = [];
    if (ctx.includes('ornament') || ctx.includes('scenic') || ctx.includes('villa') || ctx.includes('hotel') || ctx.includes('park') || ctx.includes('parco') || ctx.includes('resort')) {
      recIds = recIds.concat([4, 13, 1]); // Jacaranda, Phoenix, Ulivo
    }
    if (ctx.includes('siepe') || ctx.includes('hedge') || ctx.includes('privacy') || ctx.includes('zivic') || ctx.includes('hecke')) {
      recIds = recIds.concat([10, 11]); // Pittosporo, Mirto
    }
    if (ctx.includes('frutto') || ctx.includes('fruit') || ctx.includes('produz') || ctx.includes('vocnjak') || ctx.includes('obst')) {
      recIds = recIds.concat([7, 8]); // Arancio, Limone
    }
    if (ctx.includes('arido') || ctx.includes('dry') || ctx.includes('xero') || ctx.includes('suhi') || ctx.includes('trocken')) {
      recIds = recIds.concat([16, 9, 1]); // Agave, Fico d'India, Ulivo
    }
    if (ctx.includes('aromatica') || ctx.includes('aromat') || ctx.includes('erbe') || ctx.includes('herb')) {
      recIds = recIds.concat([14, 15]); // Lavanda, Rosmarino
    }
    if (ctx.includes('palma') || ctx.includes('palm') || ctx.includes('tropical') || ctx.includes('tropic')) {
      recIds = recIds.concat([12, 13]); // Chamaerops, Phoenix
    }
    // Default fallback
    if (!recIds.length) recIds = [1, 12, 5]; // Ulivo, Chamaerops, Oleandro

    // Deduplicate and take max 3
    var seen = {};
    var finalIds = [];
    recIds.forEach(function(id) { if (!seen[id] && finalIds.length < 3) { seen[id] = true; finalIds.push(id); } });

    // Get actual plant objects
    var recPlants = finalIds.map(function(id) { return PLANTS.find(function(p) { return p.id === id; }); }).filter(Boolean);

    // Build display text
    var recsText = recPlants.map(function(p) { return '- ' + plantName(p); }).join('\n');

    // Auto-add to quoteItems (qty 1, starting price)
    recPlants.forEach(function(p) {
      if (!quoteItems[p.id]) {
        var price = p.sizes ? p.sizes[0].price : p.price;
        quoteItems[p.id] = { qty: 1, note: '', price: price, sizeIdx: 0 };
      }
    });

    var addedMsg = {
      it: 'Ho aggiunto queste specie al tuo preventivo. Puoi modificare quantita e formati nel wizard.',
      en: 'I have added these species to your quote. You can adjust quantities and sizes in the wizard.',
      hr: 'Dodao sam ove vrste u vasu ponudu. Mozete prilagoditi kolicine i velicine u wizardu.',
      de: 'Ich habe diese Arten zu Ihrem Angebot hinzugefuegt. Sie koennen Mengen und Groessen im Assistenten anpassen.'
    };
    var btns = {
      it: ['Vai al preventivo', 'Vedi catalogo'],
      en: ['Go to quote', 'See catalogue'],
      hr: ['Idi na ponudu', 'Pogledajte katalog'],
      de: ['Zum Angebot', 'Katalog ansehen']
    };
    var finalMsg = {
      it: 'Perfetto! Le specie piu adatte al tuo progetto:\n\n' + recsText + '\n\n' + addedMsg.it,
      en: 'Great! The most suitable species for your project:\n\n' + recsText + '\n\n' + addedMsg.en,
      hr: 'Izvrsno! Najprikladnije vrste za vas projekt:\n\n' + recsText + '\n\n' + addedMsg.hr,
      de: 'Perfekt! Die geeignetsten Arten fuer Ihr Projekt:\n\n' + recsText + '\n\n' + addedMsg.de
    };
    addBotMessage(finalMsg[currentLang] || finalMsg.en, btns[currentLang] || btns.en);
  } else if (chatState === 'done') {
    if (low.includes('prev') || low.includes('quot') || low.includes('ponud') || low.includes('angebot') || low.includes('izrad') || low.includes('vai') || low.includes('go') || low.includes('idi') || low.includes('zum')) {
      showPage('quote');
      // Refresh Q1 grid to reflect auto-added items
      renderQ1Grid();
      updateStepUI();
    } else if (low.includes('cat') || low.includes('katal')) {
      showPage('catalog');
    } else {
      var restartBtns = { it:['Vai al preventivo','Vedi catalogo'], en:['Go to quote','See catalogue'], hr:['Idi na ponudu','Katalog'], de:['Zum Angebot','Katalog'] };
      var restartMsg = { it:'Posso aiutarti con altro?', en:'Can I help with anything else?', hr:'Mogu li pomoci s nesto drugim?', de:'Kann ich noch helfen?' };
      addBotMessage(restartMsg[currentLang] || restartMsg.en, restartBtns[currentLang] || restartBtns.en);
    }
    chatState = 'start'; chatCtx = {};
  }
}

/* ── DETECT LANG & INIT ── */
function detectBrowserLang() {
  var bl = (navigator.language || 'it').toLowerCase();
  if (bl.startsWith('hr') || bl.startsWith('bs') || bl.startsWith('sr')) return 'hr';
  if (bl.startsWith('de') || bl.startsWith('at')) return 'de';
  if (bl.startsWith('en')) return 'en';
  return 'it';
}

// INIT
currentLang = detectBrowserLang();
document.querySelectorAll('.lb').forEach(function(b) {
  b.classList.toggle('on', b.textContent === currentLang.toUpperCase());
});

renderFilters();
renderGrid();
renderQ1Grid();
renderRoles();

var params = new URLSearchParams(window.location.search);
if (params.get('nfc') === '1') showNFC();
var plantParam = params.get('plant');
if (plantParam) {
  showPage('catalog');
  setTimeout(function() { openCard(parseInt(plantParam)); }, 400);
}
